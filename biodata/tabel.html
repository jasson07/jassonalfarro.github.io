<title>Tabel Biodata</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Montserrat',sans-serif;
}

body{
    background:linear-gradient(135deg,#0a1f44,#0d47a1,#1976d2);
    color:white;
    min-height:100vh;
    padding:60px 20px;
}

/* JUDUL */
h1{
    text-align:center;
    margin-bottom:40px;
    font-size:32px;
    color:#bbdefb;
}

/* TABEL */
.table-container{
    overflow-x:auto;
}

table{
    width:100%;
    max-width:850px;
    margin:auto;
    border-collapse:collapse;
    background:rgba(255,255,255,0.08);
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

th, td{
    padding:14px 18px;
    text-align:center;
}

th{
    background:#2196f3;
    color:white;
    font-weight:600;
    font-size:15px;
}

td{
    color:#e3f2fd;
    border-bottom:1px solid rgba(255,255,255,0.1);
}

/* HOVER */
tr:hover td{
    background:rgba(33,150,243,0.2);
}

/* TOMBOL KEMBALI */
.back-btn{
    display:block;
    width:220px;
    margin:40px auto 0;
    padding:12px;
    text-align:center;
    background:#2196f3;
    color:white;
    text-decoration:none;
    border-radius:30px;
    font-weight:600;
    transition:0.3s;
}

.back-btn:hover{
    background:#42a5f5;
    transform:scale(1.05);
}

/* RESPONSIVE */
@media(max-width:600px){

    h1{
        font-size:26px;
    }

    th,td{
        padding:10px;
        font-size:13px;
    }

}

</style>
</head>
